<!DOCTYPE html>
<html lang="en" id="htmlRoot">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LINGO BOT | Pair Code Generator</title>

<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
body {
    font-family: 'Inter', sans-serif;
    transition: background 0.4s ease, color 0.4s ease;
}

body.light {
    background: linear-gradient(135deg,#e0e7ff,#f8fafc);
}

body.dark {
    background: linear-gradient(135deg,#0f172a,#1e293b);
}

.glass {
    backdrop-filter: blur(18px);
    border-radius: 20px;
    transition: all 0.3s ease;
}

body.light .glass {
    background: rgba(255,255,255,0.75);
    border: 1px solid rgba(0,0,0,0.05);
}

body.dark .glass {
    background: rgba(15,23,42,0.75);
    border: 1px solid rgba(255,255,255,0.08);
}

.pair-code {
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 8px;
}

.spinner {
    display: none;
    width: 20px;
    height: 20px;
    border: 3px solid rgba(255,255,255,0.3);
    border-top: 3px solid #3b82f6;
    border-radius: 50%;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}
</style>
</head>

<body class="dark min-h-screen flex items-center justify-center px-4">

<!-- Toggle -->
<button onclick="toggleTheme()" 
class="absolute top-6 right-6 px-4 py-2 rounded-full text-sm font-medium bg-blue-600 text-white shadow-md hover:scale-105 transition">
<i class="fas fa-moon mr-2"></i> Toggle Mode
</button>

<a href="/" class="absolute top-6 left-6 text-sm font-medium flex items-center gap-2 opacity-80 hover:opacity-100 transition">
<i class="fas fa-arrow-left"></i> Home
</a>

<div class="glass w-full max-w-md p-8 shadow-2xl">

    <div class="text-center mb-8">
        <div class="w-16 h-16 mx-auto rounded-full bg-blue-500/20 flex items-center justify-center mb-4">
            <i class="fas fa-link text-blue-500 text-2xl"></i>
        </div>
        <h1 class="text-2xl font-bold">LINGO PAIR CODE</h1>
        <p class="text-sm opacity-70 mt-2">
            Enter your WhatsApp number to get pairing code
        </p>
    </div>

    <!-- Input -->
    <div class="mb-6">
        <label for="phone" class="block text-sm font-medium mb-2">
            Phone Number (with country code)
        </label>

        <div class="relative">
            <i class="fas fa-phone absolute left-4 top-4 opacity-60"></i>
            <input type="text" id="phone"
                placeholder="e.g., 254712345678"
                inputmode="numeric"
                class="w-full pl-12 pr-4 py-3 rounded-xl border focus:outline-none focus:ring-2 focus:ring-blue-500 transition bg-transparent">
        </div>

        <div class="text-red-500 text-sm mt-2 hidden" id="phoneError">
            Please enter a valid phone number
        </div>
    </div>

    <!-- Button -->
    <button class="w-full py-3 rounded-xl bg-blue-600 hover:bg-blue-700 text-white font-semibold flex items-center justify-center gap-2 transition transform hover:-translate-y-1"
        id="generateBtn">
        <span id="btnText">Generate Code</span>
        <div class="spinner" id="spinner"></div>
    </button>

    <!-- Result -->
    <div class="mt-8 hidden" id="resultBox">
        <p class="text-center text-sm opacity-70">Your pairing code is:</p>

        <div class="pair-code text-3xl font-bold text-center text-blue-500 my-6" id="pairCode"></div>

        <p class="text-center text-xs opacity-60 mb-6">
            Enter this code in WhatsApp > Linked Devices
        </p>

        <div class="flex flex-col sm:flex-row gap-4">
            <button class="flex-1 py-2 rounded-lg bg-blue-600 hover:bg-blue-700 text-white font-medium flex items-center justify-center gap-2 transition"
                id="copyBtn">
                <i class="fas fa-copy"></i> Copy
            </button>

            <a href="/" class="flex-1 py-2 rounded-lg bg-gray-400 hover:bg-gray-500 text-white text-center font-medium transition">
                <i class="fas fa-arrow-left mr-1"></i> Back
            </a>
        </div>

        <div class="text-green-500 text-center mt-4 hidden" id="successMessage">
            <i class="fas fa-check-circle"></i> Code copied to clipboard!
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

<script>
const phoneInput = document.getElementById('phone');
const generateBtn = document.getElementById('generateBtn');
const btnText = document.getElementById('btnText');
const spinner = document.getElementById('spinner');
const resultBox = document.getElementById('resultBox');
const pairCode = document.getElementById('pairCode');
const copyBtn = document.getElementById('copyBtn');
const phoneError = document.getElementById('phoneError');
const successMessage = document.getElementById('successMessage');
const body = document.body;

function toggleTheme() {
    body.classList.toggle('dark');
    body.classList.toggle('light');
}

function validatePhone(number) {
    const cleaned = number.replace(/\D/g, '');
    return cleaned.length >= 10 && cleaned.length <= 15;
}

generateBtn.addEventListener('click', async () => {
    const phone = phoneInput.value.trim();
    
    if (!validatePhone(phone)) {
        phoneError.classList.remove('hidden');
        return;
    }

    phoneError.classList.add('hidden');

    btnText.style.display = 'none';
    spinner.style.display = 'inline-block';
    generateBtn.disabled = true;

    try {
        const response = await axios.get(`/pair?number=${phone}`);
        
        if (response.data.success && response.data.code) {
            pairCode.textContent = response.data.code;
            resultBox.classList.remove('hidden');
        } else {
            alert('Error generating code. Please try again.');
        }
    } catch (error) {
        console.error('Error:', error);
        alert('Service error. Please try again later.');
    } finally {
        btnText.style.display = 'inline';
        spinner.style.display = 'none';
        generateBtn.disabled = false;
    }
});

copyBtn.addEventListener('click', () => {
    const code = pairCode.textContent;
    navigator.clipboard.writeText(code).then(() => {
        successMessage.classList.remove('hidden');
        setTimeout(() => {
            successMessage.classList.add('hidden');
        }, 2000);
    });
});

phoneInput.addEventListener('input', () => {
    phoneError.classList.add('hidden');
});
</script>

</body>
</html>
